<body>
  <div class="app">
    <header class="top"><h1>商品登記</h1><p>客人登記與新增活動都在同一個 POS 面板完成</p></header>
    <main class="layout">
      <section class="terminal" aria-labelledby="formTitle">
        <div class="mode-buttons"><button class="active" id="customerModeButton" type="button">客人登記</button><button id="activityModeButton" type="button">新增活動</button></div>
        <div id="customerView" class="form-view active"><div class="form-title"><h2 id="formTitle">快速登記</h2><span class="sync" id="syncText">尚未同步</span></div><form id="registrationForm" novalidate><div class="field"><label for="customerName">客人姓名</label><input id="customerName" autocomplete="name" required placeholder=""></div><div class="field"><label for="registrationProductName">商品名稱</label><input id="registrationProductName" required placeholder=""></div><div id="productStatus" class="product-status">輸入商品名稱後會顯示此商品是否可登記。</div><div class="field"><label for="registrationQuantity">數量</label><input id="registrationQuantity" type="text" inputmode="numeric" pattern="[0-9]*" value="1" required></div><button class="submit" id="registrationSubmit" type="submit">送出登記</button><div class="msg" id="registrationMessage" role="status"></div></form></div>
        <div id="activityView" class="form-view"><div class="form-title"><h2>新增活動</h2><span class="sync">商品日期與名額</span></div><form id="activityForm" novalidate><div class="field"><label for="activityProductName">產品名稱</label><input id="activityProductName" required placeholder="例如：咖啡"></div><div class="two-fields"><div class="field"><label for="activityStartAt">活動開始日期</label><input id="activityStartAt" type="date" required></div><div class="field"><label for="activityEndAt">活動結束日期</label><input id="activityEndAt" type="date" required></div></div><div class="field"><label for="quotaLimit">數量 / 名額限制</label><input id="quotaLimit" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="不填代表無上限"></div><button class="submit secondary" id="activitySubmit" type="submit">新增活動</button><div class="msg" id="activityMessage" role="status"></div></form></div>
      </section>
      <section class="dashboard"><section class="panel"><div class="section-title"><div><h2>商品活動與加總表</h2><p>點擊商品列可查看登記名單</p></div></div><div class="table-wrap"><table id="activitiesTable"><thead><tr><th>商品名稱</th><th>總數量</th><th>名額</th><th>商品狀態</th><th>開始日期</th><th>結束日期</th><th>最後更新時間</th></tr></thead><tbody id="activitiesBody"><tr class="empty"><td colspan="7">尚無商品活動</td></tr></tbody></table></div></section><section class="panel"><div class="section-title registration-title"><div class="title-delete-row"><div class="title-copy"><div class="title-line"><h2 id="registrationListTitle">客人登記明細</h2></div><div class="hint-line"><p id="registrationListHint">點擊上方商品列可查看該商品登記名單</p></div></div><button class="danger-button delete-option-b" id="deleteActivityButtonB" type="button">刪除活動</button></div></div><div class="detail-tools" id="detailTools" style="display:none"><span id="selectedProductText"></span><button type="button" id="showAllRegistrations">查看全部</button></div><div class="pickup-list" id="pickupList" style="display:none"></div><div class="table-wrap" id="registrationsTableWrap"><table id="registrationsTable"><thead id="registrationsHead"><tr><th>商品名稱</th><th>客人姓名</th><th>數量</th><th>登記時間</th></tr></thead><tbody id="registrationsBody"><tr class="empty"><td colspan="4">尚無登記明細</td></tr></tbody></table></div></section></section>
    </main>

<script>
const SUPABASE_URL = "https://fofyyemkohotxhaoyvms.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_pJM_n5Dmyxp1K3kUDA6KUQ_V87Qn7Ts";
const REFRESH_INTERVAL_MS = 5000;
const els={customerModeButton:document.getElementById("customerModeButton"),activityModeButton:document.getElementById("activityModeButton"),customerView:document.getElementById("customerView"),activityView:document.getElementById("activityView"),syncText:document.getElementById("syncText"),registrationForm:document.getElementById("registrationForm"),customerName:document.getElementById("customerName"),registrationProductName:document.getElementById("registrationProductName"),registrationQuantity:document.getElementById("registrationQuantity"),registrationSubmit:document.getElementById("registrationSubmit"),registrationMessage:document.getElementById("registrationMessage"),productStatus:document.getElementById("productStatus"),activityForm:document.getElementById("activityForm"),activityProductName:document.getElementById("activityProductName"),activityStartAt:document.getElementById("activityStartAt"),activityEndAt:document.getElementById("activityEndAt"),quotaLimit:document.getElementById("quotaLimit"),activitySubmit:document.getElementById("activitySubmit"),activityMessage:document.getElementById("activityMessage"),activitiesBody:document.getElementById("activitiesBody"),pickupList:document.getElementById("pickupList"),registrationsTableWrap:document.getElementById("registrationsTableWrap"),registrationsTable:document.getElementById("registrationsTable"),registrationsHead:document.getElementById("registrationsHead"),registrationsBody:document.getElementById("registrationsBody"),registrationListTitle:document.getElementById("registrationListTitle"),registrationListHint:document.getElementById("registrationListHint"),detailTools:document.getElementById("detailTools"),selectedProductText:document.getElementById("selectedProductText"),showAllRegistrations:document.getElementById("showAllRegistrations"),deleteActivityButton:document.getElementById("deleteActivityButtonB")};
const isConfigured=!SUPABASE_URL.includes("請填入")&&SUPABASE_URL.length>0&&!SUPABASE_ANON_KEY.includes("請填入")&&SUPABASE_ANON_KEY.length>0;
const supabaseClient=isConfigured?window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY):null;
let productActivities=[];let allRegistrations=[];let selectedNormalizedProductName=null;let isRegistrationSubmitting=false;let isActivitySubmitting=false;let isDeletingActivity=false;let editingRegistration=null;let currentProductState={ok:false,status:"none",message:"輸入商品名稱後會顯示此商品是否可登記。"};
function cleanProduct(v){return v.trim().replace(/s+/g," ");}
function normalizeProduct(v){return cleanProduct(v).toLocaleLowerCase();}
function escapeHtml(v){return String(v??"").replace(/[&<>'"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c];});}
function formatDateTime(v){if(!v)return"--";const d=new Date(v);if(Number.isNaN(d.getTime()))return"時間格式錯誤";return new Intl.DateTimeFormat("zh-TW",{year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",hour12:false}).format(d);}function formatDate(v){if(!v)return"--";const d=new Date(v);if(Number.isNaN(d.getTime()))return"時間格式錯誤";return new Intl.DateTimeFormat("zh-TW",{year:"numeric",month:"2-digit",day:"2-digit"}).format(d);}
function toIsoFromDate(v,endOfDay){if(!v)return null;const parts=v.split("-").map(Number);if(parts.length!==3||parts.some(Number.isNaN))return null;const d=new Date(parts[0],parts[1]-1,parts[2],endOfDay?23:0,endOfDay?59:0,endOfDay?59:0,endOfDay?999:0);return Number.isNaN(d.getTime())?null:d.toISOString();}
function findActivity(productName){const normalized=normalizeProduct(productName);return productActivities.find(function(item){return item.normalized_product_name===normalized;});}

function activityState(activity){if(!activity)return{ok:false,status:"none",label:"未建立",message:"此商品尚未新增活動，請先切換到新增活動。"};const total=Number(activity.total_quantity||0);const quota=activity.quota_limit==null?null:Number(activity.quota_limit);const remaining=quota==null?null:quota-total;const now=Date.now(),start=new Date(activity.start_at).getTime(),end=new Date(activity.end_at).getTime();if(now<start)return{ok:false,status:"wait",label:"尚未開始",message:"此商品尚未開始。開始："+formatDate(activity.start_at)};if(now>end)return{ok:false,status:"end",label:"已結束",message:"此商品活動已結束。"};if(quota!=null&&remaining<=0)return{ok:false,status:"full",label:"已額滿",message:"此商品名額已滿。"};return{ok:true,status:"live",label:"可登記",message:quota==null?"此商品目前可登記，無名額上限。":"此商品目前可登記，剩餘名額 "+remaining+"。"};}
function setMsg(el,text,type){el.textContent=text;el.className="msg"+(type?" "+type:"");}

function setMode(mode){const customer=mode==="customer";els.customerModeButton.classList.toggle("active",customer);els.activityModeButton.classList.toggle("active",!customer);els.customerView.classList.toggle("active",customer);els.activityView.classList.toggle("active",!customer);if(!customer)els.activityProductName.focus();else els.registrationProductName.focus();}
function updateProductStatus(){const name=cleanProduct(els.registrationProductName.value);if(!isConfigured){currentProductState={ok:false,status:"error",message:"Supabase 尚未設定。"};}else if(!name){currentProductState={ok:false,status:"none",message:"輸入商品名稱後會顯示此商品是否可登記。"};}else{currentProductState=activityState(findActivity(name));}els.productStatus.textContent=currentProductState.message;els.productStatus.className="product-status "+currentProductState.status;updateRegistrationButton();}
function updateRegistrationButton(){const disabled=!isConfigured||(!editingRegistration&&!currentProductState.ok)||isRegistrationSubmitting;els.registrationSubmit.disabled=disabled;els.registrationSubmit.textContent=isRegistrationSubmitting?(editingRegistration?"儲存中":"送出中"):(editingRegistration?"儲存修改":(!currentProductState.ok?"目前不可登記":"送出登記"));}
function updateActivityButton(){els.activitySubmit.disabled=!isConfigured||isActivitySubmitting;els.activitySubmit.textContent=isActivitySubmitting?"新增中":"新增活動";}
function tag(state){return '<span class="tag '+state.status+'">'+escapeHtml(state.label)+'</span>';}
function quotaText(row){if(row.quota_limit==null)return '無上限';const total=Number(row.total_quantity||0),quota=Number(row.quota_limit),left=Math.max(0,quota-total);return '<span class="tag limit">'+total+' / '+quota+'，剩 '+left+'</span>';}
function groupedRows(normalizedProductName){const map=new Map();allRegistrations.filter(function(row){return row.normalized_product_name===normalizedProductName;}).forEach(function(row){const key=row.customer_name.trim();const existing=map.get(key)||{customer_name:key,quantity:0,picked_up:true};existing.quantity+=Number(row.quantity||0);existing.picked_up=existing.picked_up&&!!row.picked_up;map.set(key,existing);});return Array.from(map.values()).sort(function(a,b){if(a.picked_up!==b.picked_up)return a.picked_up?1:-1;return a.customer_name.localeCompare(b.customer_name,'zh-Hant');});}
function canDeleteSelectedActivity(activity, rows){if(!activity)return false;const ended=Date.now()>new Date(activity.end_at).getTime();return ended&&(rows.length===0||rows.every(function(row){return row.picked_up;}));}
function renderActivities(rows){if(!rows.length){els.activitiesBody.innerHTML='<tr class="empty"><td colspan="7">尚無商品活動</td></tr>';return;}els.activitiesBody.innerHTML=rows.map(function(row){const state=activityState(row);const selected=row.normalized_product_name===selectedNormalizedProductName?' selected':'';return '<tr class="activity-row'+selected+'" tabindex="0" data-product="'+escapeHtml(row.normalized_product_name)+'" title="查看 '+escapeHtml(row.product_name)+' 的登記名單"><td>'+escapeHtml(row.product_name)+'</td><td class="qty">'+Number(row.total_quantity||0).toLocaleString("zh-TW")+'</td><td>'+quotaText(row)+'</td><td>'+tag(state)+'</td><td>'+formatDate(row.start_at)+'</td><td>'+formatDate(row.end_at)+'</td><td>'+formatDateTime(row.updated_at)+'</td></tr>';}).join("");}
function renderRegistrations(rows){const activity=selectedActivity();if(activity){const grouped=groupedRows(activity.normalized_product_name);const sum=grouped.reduce(function(total,row){return total+Number(row.quantity||0);},0);els.registrationListTitle.textContent=activity.product_name+' 登記名單';els.registrationListHint.textContent='共 '+grouped.length+' 位客人，數量合計 '+sum.toLocaleString("zh-TW");els.selectedProductText.textContent='目前查看：'+activity.product_name;els.detailTools.style.display='flex';els.registrationsTableWrap.style.display='none';els.pickupList.style.display='block';els.deleteActivityButton.classList.add('show');if(!grouped.length){els.pickupList.innerHTML='<div class="pickup-grid"><div class="pickup-list-row pickup-list-head"><div class="pickup-list-cell">已取走</div><div class="pickup-list-cell">客人姓名</div><div class="pickup-list-cell">數量</div><div class="pickup-list-fill"></div></div><div class="empty" style="padding:26px 14px;text-align:center;color:var(--muted)">此商品尚無登記名單</div></div>';return;}els.pickupList.innerHTML='<div class="pickup-grid"><div class="pickup-list-row pickup-list-head"><div class="pickup-list-cell">已取走</div><div class="pickup-list-cell">客人姓名</div><div class="pickup-list-cell">數量</div></div>'+grouped.map(function(row){return '<div class="pickup-list-row '+(row.picked_up?'picked-row':'')+'" data-customer="'+escapeHtml(row.customer_name)+'" data-quantity="'+Number(row.quantity)+'"><div class="pickup-list-cell"><input class="picked-check" type="checkbox" data-customer="'+escapeHtml(row.customer_name)+'" '+(row.picked_up?'checked':'')+' aria-label="'+escapeHtml(row.customer_name)+' 已取走"></div><div class="pickup-list-cell pickup-list-name">'+escapeHtml(row.customer_name)+'</div><div class="pickup-list-cell pickup-list-qty">'+Number(row.quantity).toLocaleString("zh-TW")+'</div><div class="pickup-list-fill"></div></div>';}).join("")+'</div>';return;}els.registrationListTitle.textContent='客人登記明細';els.registrationListHint.textContent='點擊上方商品列可查看該商品登記名單';els.selectedProductText.textContent='';els.detailTools.style.display='none';els.deleteActivityButton.classList.remove('show');els.pickupList.style.display='none';els.registrationsTableWrap.style.display='block';els.registrationsTable.classList.remove('pickup-table');els.registrationsHead.innerHTML='<tr><th>商品名稱</th><th>客人姓名</th><th>數量</th><th>登記時間</th></tr>';if(!rows.length){els.registrationsBody.innerHTML='<tr class="empty"><td colspan="4">尚無登記明細</td></tr>';return;}els.registrationsBody.innerHTML=rows.map(function(row){return '<tr><td>'+escapeHtml(row.product_name)+'</td><td>'+escapeHtml(row.customer_name)+'</td><td class="quantity-cell">'+Number(row.quantity).toLocaleString("zh-TW")+'</td><td>'+formatDateTime(row.created_at)+'</td></tr>';}).join("");}
async function loadData(){if(!isConfigured){updateProductStatus();return;}try{const results=await Promise.all([supabaseClient.from("product_activity_summary").select("product_name,normalized_product_name,start_at,end_at,quota_limit,total_quantity,updated_at,created_at").order("created_at",{ascending:false}),supabaseClient.from("registrations").select("customer_name,product_name,normalized_product_name,quantity,picked_up,created_at").order("created_at",{ascending:false}).limit(500)]);if(results[0].error)throw results[0].error;if(results[1].error)throw results[1].error;productActivities=results[0].data||[];allRegistrations=results[1].data||[];if(selectedNormalizedProductName&&!productActivities.some(function(item){return item.normalized_product_name===selectedNormalizedProductName;}))selectedNormalizedProductName=null;renderActivities(productActivities);renderRegistrations(allRegistrations);updateProductStatus();const nowText=new Intl.DateTimeFormat("zh-TW",{hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false}).format(new Date());els.syncText.textContent="已同步 "+nowText;}catch(error){console.error(error);setMsg(els.registrationMessage,error.message||"資料讀取失敗，請檢查 Supabase 設定。","error");}}
els.customerModeButton.addEventListener("click",function(){setMode("customer");});els.activityModeButton.addEventListener("click",function(){setMode("activity");});els.activitiesBody.addEventListener("click",function(event){const row=event.target.closest(".activity-row");if(!row)return;selectedNormalizedProductName=row.dataset.product;renderActivities(productActivities);renderRegistrations(allRegistrations);});els.activitiesBody.addEventListener("keydown",function(event){if(event.key!=="Enter"&&event.key!==" ")return;const row=event.target.closest(".activity-row");if(!row)return;event.preventDefault();selectedNormalizedProductName=row.dataset.product;renderActivities(productActivities);renderRegistrations(allRegistrations);});els.showAllRegistrations.addEventListener("click",function(){selectedNormalizedProductName=null;renderActivities(productActivities);renderRegistrations(allRegistrations);});els.registrationProductName.addEventListener("input",updateProductStatus);els.registrationQuantity.addEventListener("input",function(){onlyDigitsInput(els.registrationQuantity);});els.registrationQuantity.addEventListener("keydown",function(event){if(["+","-","e","E",".",","].includes(event.key))event.preventDefault();});els.quotaLimit.addEventListener("input",function(){onlyDigitsInput(els.quotaLimit);});els.quotaLimit.addEventListener("keydown",function(event){if(["+","-","e","E",".",","].includes(event.key))event.preventDefault();});
els.pickupList.addEventListener("change",async function(event){
  const activity=selectedActivity();
  if(!activity)return;
  const target=event.target;
  if(!target.classList.contains('picked-check'))return;
  try{
    const result=await supabaseClient.rpc("set_customer_product_picked_up",{p_customer_name:target.dataset.customer,p_product_name:activity.product_name,p_picked_up:target.checked});
    if(result.error)throw result.error;
    await loadData();
  }catch(error){
    console.error(error);
    setMsg(els.registrationMessage,error.message||"更新已取走狀態失敗。","error");
    target.checked=!target.checked;
  }
});
els.pickupList.addEventListener("click",function(event){
  if(event.target.closest('.picked-check'))return;
  const row=event.target.closest('.pickup-list-row:not(.pickup-list-head)');
  const activity=selectedActivity();
  if(!row||!activity)return;
  editingRegistration={customerName:row.dataset.customer,productName:activity.product_name};
  els.customerName.value=row.dataset.customer;
  els.registrationProductName.value=activity.product_name;
  els.registrationQuantity.value=row.dataset.quantity;
  setMode("customer");
  updateProductStatus();
  setMsg(els.registrationMessage,"正在修改 "+row.dataset.customer+" 的 "+activity.product_name+" 數量。","ok");
  updateRegistrationButton();
  els.registrationQuantity.focus();
  els.registrationQuantity.select();
});
async function handleDeleteActivity(){const activity=selectedActivity();if(!activity||isDeletingActivity)return;if(!confirm('確定刪除「'+activity.product_name+'」活動與登記資料？'))return;isDeletingActivity=true;els.deleteActivityButton.disabled=true;try{const result=await supabaseClient.rpc("delete_product_activity",{p_product_name:activity.product_name});if(result.error)throw result.error;selectedNormalizedProductName=null;setMsg(els.registrationMessage,"已刪除活動。","ok");await loadData();}catch(error){console.error(error);setMsg(els.registrationMessage,error.message||"刪除活動失敗。","error");}finally{isDeletingActivity=false;els.deleteActivityButton.disabled=false;}}
els.deleteActivityButton.addEventListener("click",handleDeleteActivity);
els.registrationForm.addEventListener("submit",async function(event){event.preventDefault();setMsg(els.registrationMessage,"");const customerName=els.customerName.value.trim();const productName=cleanProduct(els.registrationProductName.value);const quantity=Number(els.registrationQuantity.value);if(!customerName)return setMsg(els.registrationMessage,"客人姓名不可空白。","error");if(!productName)return setMsg(els.registrationMessage,"商品名稱不可空白。","error");if(!Number.isInteger(quantity)||(editingRegistration?quantity<0:quantity<=0))return setMsg(els.registrationMessage,editingRegistration?"數量必須是 0 或正整數。":"數量必須是大於 0 的整數。","error");updateProductStatus();if(!editingRegistration&&!currentProductState.ok)return setMsg(els.registrationMessage,currentProductState.message,"error");isRegistrationSubmitting=true;updateRegistrationButton();try{if(editingRegistration){const result=await supabaseClient.rpc("set_customer_product_quantity",{p_customer_name:editingRegistration.customerName,p_product_name:editingRegistration.productName,p_quantity:quantity});if(result.error)throw result.error;setMsg(els.registrationMessage,"已儲存修改："+editingRegistration.customerName+" / "+editingRegistration.productName+" / "+quantity,"ok");editingRegistration=null;}else{const result=await supabaseClient.rpc("add_registration",{p_customer_name:customerName,p_product_name:productName,p_quantity:quantity});if(result.error)throw result.error;setMsg(els.registrationMessage,"已送出："+customerName+" / "+productName+" / "+quantity,"ok");}els.registrationProductName.value="";els.registrationQuantity.value="1";await loadData();els.registrationProductName.focus();}catch(error){console.error(error);setMsg(els.registrationMessage,error.message||"送出失敗，請稍後再試。","error");}finally{isRegistrationSubmitting=false;updateRegistrationButton();}});
els.activityForm.addEventListener("submit",async function(event){event.preventDefault();setMsg(els.activityMessage,"");const productName=cleanProduct(els.activityProductName.value);const startAt=toIsoFromDate(els.activityStartAt.value,false);const endAt=toIsoFromDate(els.activityEndAt.value,true);const quotaRaw=els.quotaLimit.value.trim();const quotaLimit=quotaRaw===""?null:Number(quotaRaw);if(!productName)return setMsg(els.activityMessage,"產品名稱不可空白。","error");if(!startAt||!endAt)return setMsg(els.activityMessage,"請填寫有效的開始與結束日期。","error");if(new Date(endAt)<=new Date(startAt))return setMsg(els.activityMessage,"結束日期必須等於或晚於開始日期。","error");if(quotaRaw!==""&&(!Number.isInteger(quotaLimit)||quotaLimit<=0))return setMsg(els.activityMessage,"名額限制必須是大於 0 的整數，或留空表示無上限。","error");isActivitySubmitting=true;updateActivityButton();try{const result=await supabaseClient.rpc("create_product_activity",{p_product_name:productName,p_start_at:startAt,p_end_at:endAt,p_quota_limit:quotaLimit});if(result.error)throw result.error;setMsg(els.activityMessage,"已新增活動："+productName,"ok");els.activityProductName.value="";els.activityStartAt.value="";els.activityEndAt.value="";els.quotaLimit.value="";await loadData();}catch(error){console.error(error);setMsg(els.activityMessage,error.message||"新增活動失敗，請稍後再試。","error");}finally{isActivitySubmitting=false;updateActivityButton();}});
updateActivityButton();updateProductStatus();loadData();window.setInterval(loadData,REFRESH_INTERVAL_MS);
</script>
