}

  els.customerName.focus();
});
els.editActivityButton.addEventListener("click",function(){const activity=selectedActivity();if(!activity)return;editingActivity=activity;setMode("activity");els.activityProductName.value=activity.product_name;els.activityStartAt.value=activity.start_at?activity.start_at.slice(0,10):"";els.activityEndAt.value=activity.end_at?activity.end_at.slice(0,10):"";els.quotaLimit.value=activity.quota_limit==null?"":activity.quota_limit;setMsg(els.activityMessage,"正在編輯 "+activity.product_name+" 活動。","ok");updateActivityButton();els.activityProductName.focus();});
async function handleDeleteActivity(){const activity=selectedActivity();if(!activity||isDeletingActivity)return;const confirmed=await openConfirm('確定刪除「'+activity.product_name+'」活動與登記資料？此動作會刪除名單與加總資料。');if(!confirmed)return;isDeletingActivity=true;els.deleteActivityButton.disabled=true;try{const result=await supabaseClient.rpc("delete_product_activity",{p_product_name:activity.product_name});if(result.error)throw result.error;selectedNormalizedProductName=null;setMsg(els.registrationMessage,"已刪除活動。","ok");await loadData();}catch(error){console.error(error);setMsg(els.registrationMessage,error.message||"刪除活動失敗。","error");}finally{isDeletingActivity=false;els.deleteActivityButton.disabled=false;}}
els.deleteActivityButton.addEventListener("click",handleDeleteActivity);
els.registrationForm.addEventListener("submit",async function(event){event.preventDefault();setMsg(els.registrationMessage,"");const customerName=els.customerName.value.trim();const productName=cleanProduct(els.registrationProductName.value);const quantity=Number(els.registrationQuantity.value);if(!customerName)return setMsg(els.registrationMessage,"客人姓名不可空白。","error");if(!productName)return setMsg(els.registrationMessage,"商品名稱不可空白。","error");if(!Number.isInteger(quantity)||(editingRegistration?quantity<0:quantity<=0))return setMsg(els.registrationMessage,editingRegistration?"數量必須是 0 或正整數。":"數量必須是大於 0 的整數。","error");updateProductStatus();if(!editingRegistration&&!currentProductState.ok)return setMsg(els.registrationMessage,currentProductState.message,"error");isRegistrationSubmitting=true;updateRegistrationButton();try{if(editingRegistration){const result=await supabaseClient.rpc("set_customer_product_quantity",{p_customer_name:editingRegistration.customerName,p_product_name:editingRegistration.productName,p_quantity:quantity});if(result.error)throw result.error;setMsg(els.registrationMessage,"已儲存修改："+editingRegistration.customerName+" / "+editingRegistration.productName+" / "+quantity,"ok");editingRegistration=null;}else{const result=await supabaseClient.rpc("add_registration",{p_customer_name:customerName,p_product_name:productName,p_quantity:quantity});if(result.error)throw result.error;setMsg(els.registrationMessage,"已送出："+customerName+" / "+productName+" / "+quantity,"ok");}if(!editingRegistration){els.customerName.value="";}els.registrationProductName.value="";els.registrationQuantity.value="";await loadData();els.customerName.focus();}catch(error){console.error(error);setMsg(els.registrationMessage,error.message||"送出失敗，請稍後再試。","error");}finally{isRegistrationSubmitting=false;updateRegistrationButton();}});
els.activityForm.addEventListener("submit",async function(event){event.preventDefault();setMsg(els.activityMessage,"");const productName=cleanProduct(els.activityProductName.value);const startAt=toIsoFromDate(els.activityStartAt.value,false);const endAt=toIsoFromDate(els.activityEndAt.value,true);const quotaRaw=els.quotaLimit.value.trim();const quotaLimit=quotaRaw===""?null:Number(quotaRaw);if(!productName)return setMsg(els.activityMessage,"產品名稱不可空白。","error");if((els.activityStartAt.value&&!startAt)||(els.activityEndAt.value&&!endAt))return setMsg(els.activityMessage,"請填寫有效的開始與結束日期。","error");if(startAt&&endAt&&new Date(endAt)<=new Date(startAt))return setMsg(els.activityMessage,"結束日期必須等於或晚於開始日期。","error");if(quotaRaw!==""&&(!Number.isInteger(quotaLimit)||quotaLimit<=0))return setMsg(els.activityMessage,"名額限制必須是大於 0 的整數，或留空表示無上限。","error");isActivitySubmitting=true;updateActivityButton();try{const result=editingActivity?await supabaseClient.rpc("update_product_activity",{p_original_product_name:editingActivity.product_name,p_product_name:productName,p_start_at:startAt,p_end_at:endAt,p_quota_limit:quotaLimit}):await supabaseClient.rpc("create_product_activity",{p_product_name:productName,p_start_at:startAt,p_end_at:endAt,p_quota_limit:quotaLimit});if(result.error)throw result.error;if(editingActivity)selectedNormalizedProductName=normalizeProduct(productName);setMsg(els.activityMessage,(editingActivity?"已儲存活動：":"已新增活動：")+productName,"ok");editingActivity=null;els.activityProductName.value="";els.activityStartAt.value="";els.activityEndAt.value="";els.quotaLimit.value="";await loadData();}catch(error){console.error(error);setMsg(els.activityMessage,error.message||"新增活動失敗，請稍後再試。","error");}finally{isActivitySubmitting=false;updateActivityButton();}});

function urlBase64ToUint8Array(base64String){const padding='='.repeat((4-base64String.length%4)%4);const base64=(base64String+padding).replace(/-/g,'+').replace(/_/g,'/');const rawData=atob(base64);const outputArray=new Uint8Array(rawData.length);for(let i=0;i<rawData.length;++i)outputArray[i]=rawData.charCodeAt(i);return outputArray;}

async function checkExistingPushSubscription(){
  if(!('serviceWorker' in navigator)||!('PushManager' in window)||!els.notificationButton)return;
  try{
    const registration=await navigator.serviceWorker.getRegistration();
    if(!registration)return;
    const subscription=await registration.pushManager.getSubscription();
    if(subscription)els.notificationButton.style.display='none';
  }catch(error){console.warn('push subscription check failed',error);}
}

async function subscribeForPushNotifications(){
  if(!('serviceWorker' in navigator)||!('PushManager' in window)||!('Notification' in window)){setMsg(els.registrationMessage,'此瀏覽器不支援推播通知。','error');return;}
  if(!isConfigured){setMsg(els.registrationMessage,'Supabase 尚未設定，無法開啟通知。','error');return;}
  els.notificationButton.disabled=true;
  try{
    const permission=await Notification.requestPermission();
    if(permission!=='granted'){setMsg(els.registrationMessage,'尚未允許通知。','error');return;}
    await navigator.serviceWorker.register('service-worker.js');
    const registration=await navigator.serviceWorker.ready;
    const existingSubscription=await registration.pushManager.getSubscription();
    const subscription=existingSubscription||await registration.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlBase64ToUint8Array(VAPID_PUBLIC_KEY)});
    const result=await supabaseClient.rpc('save_push_subscription',{p_subscription:subscription.toJSON()});
    if(result.error)throw result.error;
    els.notificationButton.style.display='none';
    setMsg(els.registrationMessage,'已開啟手機推播通知。','ok');
  }catch(error){console.error(error);const message=String(error && error.message ? error.message : '開啟通知失敗。');setMsg(els.registrationMessage,message.includes('active service worker')?'通知服務正在啟動，請重新整理後再按一次開啟通知。':message,'error');}
  finally{els.notificationButton.disabled=false;}
}
els.notificationButton.addEventListener('click',subscribeForPushNotifications);

checkExistingPushSubscription();
updateActivityButton();updateProductStatus();loadData();window.setInterval(loadData,REFRESH_INTERVAL_MS);
</script>
